; GitHub Classroom addon teacher configuration.
; Teachers: fill in the values below and commit this file to your template
; repository before distributing it to students.
;
; oauth_client_id  - Your GitHub OAuth App Client ID (starts with Ov23li).
;                    This is a PUBLIC identifier — safe to commit.
;                    Students will see Sign in with GitHub without needing
;                    to enter this value themselves.
;
; organization     - Your GitHub Classroom organization name (e.g. my-school-cs).
;                    If set, students see it pre-filled and read-only.
;
; Both fields are optional.  Leave a value empty to let students fill it in.

[classroom]
oauth_client_id=
organization=
